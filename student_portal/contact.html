<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

    <div class="contact-container">

        <h1 class="page-title">Contact Us</h1>

        <div class="contact-grid">

            <!-- Left Column -->
            <div class="contact-info">

                <div class="contact-section">
                    <h2 class="section-title">Address</h2>

                    <p class="contact-text">
                        ABC Engineering College <br>
                        123 College Road <br>
                        Chennai - 600001 <br>
                        Tamil Nadu, India
                    </p>
                </div>

                <div class="contact-section">
                    <h2 class="section-title">Phone</h2>

                    <a href="tel:+919876543210" class="contact-link">
                        +91 98765 43210
                    </a>
                </div>

                <div class="contact-section">
                    <h2 class="section-title">Email</h2>

                    <a href="mailto:info@abccollege.edu" class="contact-link">
                        info@abccollege.edu
                    </a>
                </div>

                <div class="contact-section">
                    <h2 class="section-title">Website</h2>

                    <a href="https://www.abccollege.edu"
                       target="_blank"
                       class="contact-link">
                        Visit Our Website
                    </a>
                </div>

            </div>

            <!-- Right Column -->
            <div class="contact-map">

                <h2 class="section-title">Location</h2>

                <div class="map-container">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=YOUR_EMBED_LINK_HERE"
                        loading="lazy"
                        allowfullscreen>
                    </iframe>
                </div>

            </div>

        </div>

    </div>

</body>
</html>
