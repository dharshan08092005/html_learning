<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Gallery</title>
</head>
<body>

    <h1>College Gallery</h1>

    <p>
        Explore our beautiful campus, modern laboratories,
        well-equipped library, and exciting college events.
    </p>

    <hr>

    <h2>Campus</h2>

    <figure>
        <img src="imgs/campus.jpg"
             alt="College campus with academic buildings"
             width="350">
        <figcaption>Our Green and Spacious Campus</figcaption>
    </figure>

    <hr>

    <h2>Laboratories</h2>

    <figure>
        <img src="imgs/lab.jpg"
             alt="Students working in a computer laboratory"
             width="350">
        <figcaption>Modern Computer Laboratory</figcaption>
    </figure>

    <hr>

    <h2>Library</h2>

    <figure>
        <img src="imgs/library.jpg"
             alt="College library with bookshelves and study tables"
             width="350">
        <figcaption>Central Library</figcaption>
    </figure>

    <hr>

    <h2>Events</h2>

    <figure>
        <img src="imgs/events.jpg"
             alt="Students participating in a college cultural event"
             width="350">
        <figcaption>Annual Cultural Fest</figcaption>
    </figure>

</body>
</html>
