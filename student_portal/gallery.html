<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>College Gallery</title>
    <link rel="stylesheet" href="css/gallery.css" />
  </head>
  <body>
    <div class="gallery-container">
      <h1 class="page-title">College Gallery</h1>

      <p class="gallery-description">
        Explore our beautiful campus, modern laboratories, well-equipped
        library, and exciting college events.
      </p>

      <div class="gallery-grid">
        <div class="gallery-card">
          <h2 class="gallery-title">Campus</h2>

          <figure class="gallery-item">
            <img
              src="imgs/school.jpg"
              alt="College campus with academic buildings"
              class="gallery-image"
            />

            <figcaption class="gallery-caption">
              Our Green and Spacious Campus
            </figcaption>
          </figure>
        </div>

        <div class="gallery-card">
          <h2 class="gallery-title">Laboratories</h2>

          <figure class="gallery-item">
            <img
              src="imgs/lab.jpg"
              alt="Students working in a computer laboratory"
              class="gallery-image"
            />

            <figcaption class="gallery-caption">
              Modern Computer Laboratory
            </figcaption>
          </figure>
        </div>

        <div class="gallery-card">
          <h2 class="gallery-title">Library</h2>

          <figure class="gallery-item">
            <img
              src="imgs/library.jpeg"
              alt="College library with bookshelves and study tables"
              class="gallery-image"
            />

            <figcaption class="gallery-caption">Central Library</figcaption>
          </figure>
        </div>

        <div class="gallery-card">
          <h2 class="gallery-title">Events</h2>

          <figure class="gallery-item">
            <img
              src="imgs/events.jpg"
              alt="Students participating in a college cultural event"
              class="gallery-image"
            />

            <figcaption class="gallery-caption">
              Annual Cultural Fest
            </figcaption>
          </figure>
        </div>
      </div>
    </div>
  </body>
</html>
