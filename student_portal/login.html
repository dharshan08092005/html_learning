<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/login.css" />

    <title>login</title>
  </head>
  <body style="background-image: url('imgs/school.jpg');">
    <form action="login" class="login-form">
      <div>
        <img src="imgs/Asaiyum_Logo.png" alt="logo" style="max-width: 60px" />
        <h1>Student Portal</h1>
      </div>

      <label for="name" class="input-lable">Email</label>
      <input type="email" class="input-box" name="mail" id="" autocomplete autofocus />

      <br />

      <label for="password" class="input-lable">Password</label>
      <input type="password" class="input-box" pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9]).{8,}" />

      <br />

      <div class="remember">
        <input type="checkbox" class="checkbox"/>
        <label for="" class="input-remember">Remember me</label>
      </div>

      <br />

      <button class="submit-btn">
        <a href="marks.html">Submit</a>
      </button>
    </form>
  </body>
</html>
