<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/assignments.css" />

    <title>Assignments</title>
  </head>
  <body>
    <form action="assignment-form" class="assignment-form">
      <h1 class="page-title">Student Assignments</h1>

      <div class="table-container">
        <table class="assignment-table">
          <tr class="table-header-row">
            <th class="table-heading">Assignment</th>
            <th class="table-heading">Due Date</th>
            <th class="table-heading">Download</th>
            <th class="table-heading">Upload</th>
          </tr>

          <tr class="table-row">
            <td class="table-data">Python Basics</td>
            <td class="table-data">20-Aug-2025</td>

            <td class="table-data">
              <a
                class="download-link"
                href="assignments/python_assignment.pdf"
                download
              >
                Download PDF
              </a>
            </td>

            <td class="table-data">
              <input class="file-input" type="file" />
            </td>
          </tr>

          <tr class="table-row">
            <td class="table-data">Java OOP</td>
            <td class="table-data">25-Aug-2025</td>

            <td class="table-data">
              <a
                class="download-link"
                href="assignments/java_assignment.pdf"
                download
              >
                Download PDF
              </a>
            </td>

            <td class="table-data">
              <input class="file-input" type="file" />
            </td>
          </tr>

          <tr class="table-row">
            <td class="table-data">DBMS Queries</td>
            <td class="table-data">30-Aug-2025</td>

            <td class="table-data">
              <a
                class="download-link"
                href="assignments/dbms_assignment.pdf"
                download
              >
                Download PDF
              </a>
            </td>

            <td class="table-data">
              <input class="file-input" type="file" />
            </td>
          </tr>
        </table>
      </div>

      <button class="submit-btn">Submit Assignment</button>
    </form>
  </body>
</html>
