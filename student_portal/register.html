<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="student-register">
        <fieldset class="personal">
            <legend>Personal Information</legend>
            <label for="name">Name</label>
            <input type="text" required autofocus>

            

            <label for="contact">Contact</label>
            <input type="number" required pattern="[0-9]{10}">

            <br><br>

            <label for="mail">Email</label>
            <input type="email required">

            

            <label for="passwd">Password</label>
            <input type="password" minlength="5" maxlength="15"
            pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9]).{8,}">

            <br><br>

            <label for="age">Age</label>
            <input type="number" name="" id="">

            <label for="DOB">Date of Birth</label>
            <input type="date" name="" id="">

            <br><br>

            <label for="gender">Gender:</label>
            <input type="radio" name="Male" id="">Male</form>
            <input type="radio" name="Female" id="">Female</input>

            <br><br>

            <label for="skills">Skills:</label>
            <input type="checkbox" name="Java" id="1">Java</input>
            <input type="checkbox" name="Python" id="2">Python</input>
            <input type="checkbox" name="HTML" id="3">HTML</input>
            <input type="checkbox" name="CSS" id="4">CSS</input>

            <br><br>
            
            <label for="address">Address</label>
            <textarea name="address" id=""></textarea>
        </fieldset>

        <fieldset class="academic">
            <legend>Academic Infromation</legend>

            <label for="dept">Department</label>
            <select name="dept" id="">
                <optgroup>
                    <option value="cse">CSE</option>
                    <option value="aids">AIDS</option>
                    <option value="eee">EEE</option>
                    <option value="ece">ECE</option>
                </optgroup>
                <optgroup>
                    <option value="eng">English</option>
                    <option value="com">Commerce</option>
                </optgroup>
            </select>

            <label for="Semester">Semester</label>
            <select name="sem" id="">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
            </select>


            <label for="coding-skill">Coding Skill</label>
            <input type="range" value="100" id="">

            <label for="portfolio">Portfolio URL</label>
            <input type="url" name="portfolio" placeholder="www.portfolio.com">

        </fieldset>

        <fieldset class="document">
            <legend>Documents</legend>
            <label for="photo">Photo</label>
            <input type="file" name="photo" id="">

            <label for="resume">Resume</label>
            <input type="file" name="resume" id="">

        </fieldset>

        <button>Submit</button>
    </form>
</body>
</html>
