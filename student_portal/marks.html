<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/marks.css" />

    <title>Mark's Page</title>
  </head>
  <body style="background-image: url(&quot;imgs/study.jpg&quot;)">
    <div class="mark-sheet">
      <div class="back-arrow">
        <a href="index.html" class="">
          <h4 class="arrow">🡨</h4>
          <h4>Back</h4>
        </a>
      </div>

      <div class="clg-name">XYZ ENGINEERING COLLEGE</div>
      <div class="personal-details">
        <div class="name">Name : Dharshan S</div>
        <div class="name">Roll No : 123456789</div>
        <div class="name">Department : CSE</div>
        <div class="name">Semester : 1</div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th colspan="6">Academic Semester Marksheet</th>
            </tr>

            <tr>
              <th>Semester</th>
              <th>Subject</th>
              <th>Internal</th>
              <th>External</th>
              <th>Total</th>
              <th>Grade</th>
            </tr>
          </thead>
          <tbody>
            <td rowspan="5">Semester 1</td>
            <tr>
              <td>Python</td>
              <td>45</td>
              <td>50</td>
              <td>60</td>
              <td>A+</td>
            </tr>
            <tr>
              <td>Java</td>
              <td>45</td>
              <td>50</td>
              <td>60</td>
              <td>B+</td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <th colspan="4">Total</th>
              <th>120</th>
              <th>A</th>
            </tr>
            <tr>
              <th colspan="4">Average</th>
              <th>88.8</th>
              <th>Pass</th>
            </tr>
          </tfoot>
        </table>
      </div>

      <div class="signature">
        <div class="coe">Controller of examination</div>
        <div class="principal">Pricipal</div>
      </div>
    </div>
  </body>
</html>
