<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
        <thead>

            <tr>
                <th colspan="6">Semester 1 Marksheet</th>
            </tr>

            <tr>
                <th>Semester</th>
                <th>Subject</th>
                <th>Internal</th>
                <th>External</th>
                <th>Total</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody>
            <td rowspan="5">Semester 1</td>
            <tr>
                <td>Python</td>
                <td>45</td>
                <td>50</td>
                <td>60</td>
                <td>A+</td>
            </tr>
            <tr>    
                <td>Java</td>
                <td>45</td>
                <td>50</td>
                <td>60</td>
                <td>B+</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="4">Total</th>
                <th>120</th>
                <th>A</th>
            </tr>
            <tr>
                <th colspan="4">Average</th>
                <th>88.8</th>
                <th>Pass</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
